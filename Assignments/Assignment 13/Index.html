<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">
</head>
<body>
    

    <div class="card shadow p-4 rounded-4" style="max-width:400px;">
        <h3 class="text-center mb-3">Add Task</h3>

        <input type="text" class="form-control form-control-lg mb-3" id="name" placeholder="Enter your name" required>
        <input type="text" class="form-control form-control-lg mb-3" id="age" placeholder="Enter your Age" required>
        <input type="text" class="form-control form-control-lg mb-3" id="work" placeholder="Enter your Work" required>

        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Submit</button>
    </div>


    <script src="./JS/script.js"></script>
</body>
</html>
