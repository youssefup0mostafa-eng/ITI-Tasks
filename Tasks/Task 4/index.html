<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Product catalog</h1>
    <label for="product-search">Search for a product:</label>
    <input list="products" id="product-search" name="product-search" placeholder="Search..."></input>
    <datalist id="products">
        <option value="Product 1">
        <option value="Product 2">
        <option value="Product 3"> 
        </datalist>

            <label for="Category">Category:</label>
            <select id="Category" name="Category">
                <option value="">Select a category</option>
                <option value="Category 1">Category 1</option>
                <option value="Category 2">Category 2</option>
                <option value="Category 3">Category 3</option>
            </select>

            <button id="filter-button">Filter</button>

    <table>
        <thead>
            <tr>
                <th>Product Image</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Action</th>

            </tr>
        </thead>
        <tbody>
            <tr>
                <td><img src="/images/photo.jpg" alt="Product 1" width="50" height="50"></td>
                <td>Product 1</td>
                <td>This is a description of Product 1.</td>
                <td>$10.00</td>
                <td><button>Add to Cart</button></td>
            </tr>
            <tr>
                <td><img src="/images/photo.jpg" alt="Product 2" width="50" height="50"></td>
                <td>Product 2</td>
                <td>This is a description of Product 2.</td>
                <td>$20.00</td>
                <td><button>Add to Cart</button></td>
            </tr>
            <tr>
                <td><img src="/images/photo.jpg" alt="Product 3" width="50" height="50"></td>
                <td>Product 3</td>
                <td>This is a description of Product 3.</td>
                <td>$30.00</td>
                <td><button>Add to Cart</button></td>
            </tr>
        </tbody>
    
</body>
</html>
